[bench-alpha]
image=docker.io/library/alpine:latest
additional_packages="git curl"
init_hooks="echo hello"
home=~/.local/share/bench-alpha
volume="/tmp:/tmp"

[bench-beta]
image=docker.io/library/alpine:latest
additional_packages="bash sudo"
pre_init_hooks="echo pre"
volume="/var/tmp:/var/tmp"
volume="/home:/home"

[bench-gamma]
image=docker.io/library/alpine:latest
init=true
nvidia=false
pull=false
unshare_groups=true
